<div class="accept-invite-wrapper">
  <!-- Verifying state -->
  <div *ngIf="verifying" class="state-card">
    <div class="spinner"></div>
    <p>Verifying your invitation...</p>
  </div>

  <!-- Set password form -->
  <div *ngIf="!verifying" class="invite-card">
    <div class="card-header">
      <div class="logo">Churchman.</div>
      <div class="header-icon">
        <i class="ri-shield-keyhole-line"></i>
      </div>
      <h1>Accept Invitation</h1>
      <p>Set a password to activate your account</p>
    </div>

    <!-- Success -->
    <div *ngIf="successMessage" class="alert success">
      <i class="ri-checkbox-circle-line"></i>
      <span>{{ successMessage }}</span>
    </div>

    <!-- Error -->
    <div *ngIf="errorMessage" class="alert error">
      <i class="ri-error-warning-line"></i>
      <span>{{ errorMessage }}</span>
    </div>

    <form [formGroup]="form" (ngSubmit)="setPassword()" *ngIf="!successMessage">
      <div class="form-group">
        <label>New Password <span class="required">*</span></label>
        <div class="input-wrapper">
          <i class="ri-lock-line input-icon"></i>
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="Min. 8 characters"
            [class.error]="form.get('password')?.invalid && form.get('password')?.touched"
          />
          <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
            <i [class]="showPassword ? 'ri-eye-off-line' : 'ri-eye-line'"></i>
          </button>
        </div>
        <span *ngIf="form.get('password')?.touched && getError('password')" class="field-error">
          <i class="ri-error-warning-line"></i> {{ getError('password') }}
        </span>
      </div>

      <div class="form-group">
        <label>Confirm Password <span class="required">*</span></label>
        <div class="input-wrapper">
          <i class="ri-lock-line input-icon"></i>
          <input
            [type]="showConfirmPassword ? 'text' : 'password'"
            formControlName="confirmPassword"
            placeholder="Repeat your password"
            [class.error]="(form.get('confirmPassword')?.touched && getError('confirmPassword')) || passwordMismatch"
          />
          <button type="button" class="toggle-password" (click)="showConfirmPassword = !showConfirmPassword">
            <i [class]="showConfirmPassword ? 'ri-eye-off-line' : 'ri-eye-line'"></i>
          </button>
        </div>
        <span *ngIf="passwordMismatch" class="field-error">
          <i class="ri-error-warning-line"></i> Passwords do not match
        </span>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading || form.invalid">
        <ng-container *ngIf="!loading">
          <i class="ri-check-line"></i> Activate Account
        </ng-container>
        <ng-container *ngIf="loading">
          <i class="ri-loader-4-line spin"></i> Activating...
        </ng-container>
      </button>
    </form>
  </div>
</div>
