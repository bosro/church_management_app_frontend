<div class="sidebar" [class.mobile-open]="isMobileMenuOpen">
  <!-- Mobile Close Button -->
  <button class="mobile-close-btn" *ngIf="isMobile" (click)="closeSidebar()">
    <i class="ri-close-line"></i>
  </button>

  <!-- Logo -->
  <div class="sidebar-logo">
    <img src="assets/images/logo1.png" alt="Churchman" class="logo">
  </div>

  <!-- Navigation Menu -->
  <nav class="sidebar-nav" #sidebarNav>
    <ul class="menu-list">
      <ng-container *ngFor="let item of filteredMenuItems">

        <!-- Menu item WITH children (expandable) -->
        <li *ngIf="item.children && item.children.length > 0" class="menu-item-group">

          <!-- Parent row: clicking the label area navigates (if route exists),
               clicking the arrow toggles the submenu -->
          <div class="menu-item" [class.active]="item.active">
            <!-- Navigable label area -->
            <span class="menu-item-main" (click)="item.route ? navigate(item.route) : toggleSubmenu(item)">
              <i [class]="item.icon"></i>
              <span class="menu-label">{{ item.label }}</span>
            </span>
            <!-- Toggle arrow -->
            <i class="ri-arrow-down-s-line submenu-arrow" [class.expanded]="isExpanded(item)"
              (click)="toggleSubmenu(item)"></i>
          </div>

          <!-- Submenu -->
          <ul class="submenu" [class.expanded]="isExpanded(item)">
            <li *ngFor="let child of item.children" class="submenu-item" [class.active]="child.active"
              (click)="navigate(child.route!)">
              <i [class]="child.icon"></i>
              <span>{{ child.label }}</span>
              <span class="badge" *ngIf="child.badge">{{ child.badge }}</span>
            </li>
          </ul>
        </li>

        <!-- Regular menu item (no children) -->
        <li *ngIf="!item.children || item.children.length === 0" class="menu-item" [class.active]="item.active"
          (click)="navigate(item.route!)">
          <i [class]="item.icon"></i>
          <span>{{ item.label }}</span>
        </li>

      </ng-container>
    </ul>
  </nav>

  <app-ad-banner slot="sidebar"></app-ad-banner>

  <!-- User Profile -->
  <div class="sidebar-footer">
    <div class="user-profile" *ngIf="currentUser">
      <div class="user-avatar">
        <img *ngIf="currentUser.avatar_url" [src]="currentUser.avatar_url" [alt]="currentUser.full_name" />
        <div *ngIf="!currentUser.avatar_url" class="avatar-placeholder">
          {{ currentUser.full_name.charAt(0).toUpperCase() }}
        </div>
      </div>
      <div class="user-info">
        <p class="user-name">{{ currentUser.full_name }}</p>
        <p class="user-role">{{ currentUser.role.replace('_', ' ') | titlecase }}</p>
      </div>
    </div>

    <!-- Logout Button -->
    <button class="logout-btn" (click)="logout()">
      <i class="ri-logout-box-line"></i>
      <span>Logout</span>
    </button>
