<!-- src/app/shared/components/ad-banner/ad-banner.html -->
<div *ngIf="showAd && !dismissed" class="ad-banner-wrap" [class]="'ad-' + slot">
  <button class="ad-dismiss" (click)="dismiss()" title="Hide">
    <i class="ri-close-line"></i>
  </button>

  <span class="ad-label">Ad</span>

  <!-- Real Google AdSense unit -->
  <ins class="adsbygoogle" style="display:block;width:100%;max-height:55px;" [attr.data-ad-client]="publisherId"
    [attr.data-ad-slot]="adSlotId" [attr.data-ad-format]="adFormat" data-full-width-responsive="false"></ins>

  <!-- Fallback shown while ad loads or if blocked -->
  <div class="fallback-ad" *ngIf="!adLoaded">
    <div class="fallback-inner">
      <div class="fallback-logo">
        <i class="ri-advertisement-line"></i>
      </div>
      <div class="fallback-text">
        <p class="fallback-headline">Advertisement</p>
        <p class="fallback-sub">Ad loading...</p>
      </div>
    </div>
  </div>

  <!-- Upgrade nudge -->
  <div class="ad-upgrade-nudge" *ngIf="slot === 'sidebar'">
    <a (click)="navigateToUpgrade()" style="cursor:pointer;">
      Remove ads — Upgrade now <i class="ri-arrow-right-line"></i>
    </a>
  </div>
</div>
