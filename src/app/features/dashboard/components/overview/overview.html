<!-- src/app/features/dashboard/components/overview/overview.component.html -->
<div class="dashboard-layout">
  <app-sidebar></app-sidebar>

  <div class="dashboard-content">
    <app-header></app-header>

    <div class="dashboard-body">
      <!-- Loading State -->
      <div *ngIf="loading" class="loading-container">
        <div class="spinner"></div>
        <p>Loading dashboard...</p>
      </div>

      <!-- Error State -->
      <div *ngIf="!loading && hasError" class="error-container">
        <i class="ri-error-warning-line error-icon"></i>
        <h3>Failed to Load Dashboard</h3>
        <p>{{ errorMessage }}</p>
        <button class="btn-primary" (click)="retryLoad()">
          <i class="ri-refresh-line"></i>
          Retry
        </button>
      </div>


<app-ad-banner *ngIf="!loading && !hasError" slot="dashboard"></app-ad-banner>

<div *ngIf="!loading && !hasError" class="dashboard-grid"
  [class.admin-layout]="canViewQuickActions"
  [class.member-layout]="!canViewQuickActions">

        <!-- Left Section -->
        <div class="dashboard-main">
          <!-- Stats Cards -->
          <div class="stats-grid">
            <app-stats-card title="Total Members" [value]="dashboardStats?.active_members || 0" icon="ri-group-line"
              iconBg="#DDD6FE" iconColor="#7C3AED" [trend]="8.5" trendText="Up from last month"
              trendUp="true"></app-stats-card>

            <app-stats-card title="Attendance (Monthly)" [value]="dashboardStats?.attendance_this_month || 0"
              icon="ri-calendar-check-line" iconBg="#D1FAE5" iconColor="#10B981" [trend]="4.3"
              trendText="Compared to last month" trendUp="false"></app-stats-card>

            <app-stats-card title="New Members" [value]="dashboardStats?.new_members_this_month || 0"
              icon="ri-user-add-line" iconBg="#FEF3C7" iconColor="#F59E0B" [trend]="12.5"
              trendText="Compared to last month" trendUp="true"></app-stats-card>
          </div>

          <!-- Revenue Chart - Only show if user has permission -->
          <app-revenue-chart *ngIf="canViewRevenue" [chartData]="revenueData"></app-revenue-chart>

          <!-- Upcoming Birthdays -->
          <app-birthday-list [birthdays]="upcomingBirthdays" [canViewAge]="canViewAge"
            [canViewAll]="canViewAllBirthdays" (viewAll)="viewAllBirthdays()"
            (viewMember)="viewMember($event)"></app-birthday-list>
        </div>

        <!-- Right Sidebar -->
        <div class="dashboard-sidebar">
          <!-- Quick Actions - Only show for Admin/Pastor -->
          <div class="quick-actions-card" *ngIf="canViewQuickActions">
            <h3>Quick Actions</h3>
            <div class="action-grid">
              <button class="action-btn action-purple" (click)="navigateToAddMembers()" [disabled]="!canAddMembers"
                [class.disabled]="!canAddMembers">
                <i class="ri-user-add-line"></i>
                <span>Add Members</span>
              </button>

              <button class="action-btn action-pink" (click)="navigateToCheckIn()" [disabled]="!canCheckIn"
                [class.disabled]="!canCheckIn">
                <i class="ri-file-list-3-line"></i>
                <span>Check In</span>
              </button>

              <button class="action-btn action-black" (click)="navigateToCreateEvent()" [disabled]="!canCreateEvent"
                [class.disabled]="!canCreateEvent">
                <i class="ri-calendar-event-line"></i>
                <span>Create Event</span>
              </button>

              <button class="action-btn action-teal" (click)="navigateToRecordGiving()" [disabled]="!canRecordGiving"
                [class.disabled]="!canRecordGiving">
                <i class="ri-money-dollar-circle-line"></i>
                <span>Record Giving</span>
              </button>
            </div>
          </div>

          <!-- Upcoming Events - Moved to right sidebar -->
          <app-upcoming-events [events]="upcomingEvents" [canViewAll]="canViewAllEvents" (viewAll)="viewAllEvents()"
            (viewEvent)="viewEvent($event)"></app-upcoming-events>

          <!-- Pastors - Only show for Admin/Pastor -->
          <div class="team-card" *ngIf="canViewQuickActions && pastors.length > 0">
            <h3>Pastors</h3>
            <div class="team-list">
              <div *ngFor="let pastor of pastors" class="team-member">
                <div class="member-avatar">
                  <img *ngIf="pastor.avatar" [src]="pastor.avatar" [alt]="pastor.name" />
                  <div *ngIf="!pastor.avatar" class="avatar-placeholder">
                    {{ pastor.name.charAt(0) }}
                  </div>
                </div>
                <span class="member-name">{{ pastor.name }}</span>
              </div>
            </div>
          </div>

          <!-- Shepherds - Only show for Admin/Pastor -->
          <div class="team-card" *ngIf="canViewQuickActions && shepherds.length > 0">
            <h3>Group Leaders</h3>
            <div class="team-list">
              <div *ngFor="let shepherd of shepherds" class="team-member">
                <div class="member-avatar">
                  <img *ngIf="shepherd.avatar" [src]="shepherd.avatar" [alt]="shepherd.name" />
                  <div *ngIf="!shepherd.avatar" class="avatar-placeholder">
                    {{ shepherd.name.charAt(0) }}
                  </div>
                </div>
                <span class="member-name">{{ shepherd.name }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
