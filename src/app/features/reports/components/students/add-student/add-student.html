<div class="dashboard-layout">
  <app-sidebar></app-sidebar>
  <div class="dashboard-content">
    <app-header></app-header>
    <div class="dashboard-body">
      <div class="form-container">

        <div class="page-header">
          <div class="header-left">
            <button class="back-btn" (click)="cancel()">
              <i class="ri-arrow-left-line"></i>
            </button>
            <div>
              <h1>Add Student</h1>
              <p class="subtitle">Enrol a new student</p>
            </div>
          </div>
        </div>

        <div *ngIf="successMessage" class="success-alert">
          <i class="ri-checkbox-circle-line"></i>
          <span>{{ successMessage }}</span>
        </div>
        <div *ngIf="errorMessage" class="error-alert">
          <i class="ri-error-warning-line"></i>
          <span>{{ errorMessage }}</span>
        </div>

        <div class="form-card">
          <form [formGroup]="studentForm" (ngSubmit)="onSubmit()">

            <!-- Personal Info -->
            <div class="form-section">
              <h3>Personal Information</h3>
              <div class="form-grid">
                <div class="form-group">
                  <label>First Name *</label>
                  <input type="text" formControlName="first_name"
                         placeholder="e.g., Kwame"
                         [class.error]="studentForm.get('first_name')?.invalid &&
                                        studentForm.get('first_name')?.touched" />
                  <span class="error-message">{{ getError('first_name') }}</span>
                </div>

                <div class="form-group">
                  <label>Middle Name</label>
                  <input type="text" formControlName="middle_name" placeholder="Optional" />
                </div>

                <div class="form-group">
                  <label>Last Name *</label>
                  <input type="text" formControlName="last_name"
                         placeholder="e.g., Mensah"
                         [class.error]="studentForm.get('last_name')?.invalid &&
                                        studentForm.get('last_name')?.touched" />
                  <span class="error-message">{{ getError('last_name') }}</span>
                </div>

                <div class="form-group">
                  <label>Date of Birth</label>
                  <input type="date" formControlName="date_of_birth" />
                </div>

                <div class="form-group">
                  <label>Gender</label>
                  <select formControlName="gender">
                    <option value="">Select</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                  </select>
                </div>

                <div class="form-group">
                  <label>Class *</label>
                  <select formControlName="class_id"
                          [class.error]="studentForm.get('class_id')?.invalid &&
                                         studentForm.get('class_id')?.touched">
                    <option value="">Select Class</option>
                    <option *ngFor="let c of classes" [value]="c.id">
                      {{ c.name }} ({{ c.academic_year }})
                    </option>
                  </select>
                  <span class="error-message">{{ getError('class_id') }}</span>
                </div>
              </div>
            </div>

            <!-- Parent/Guardian -->
            <div class="form-section">
              <h3>Parent / Guardian</h3>
              <div class="form-grid">
                <div class="form-group">
                  <label>Parent/Guardian Name</label>
                  <input type="text" formControlName="parent_name"
                         placeholder="Full name" />
                </div>

                <div class="form-group">
                  <label>Phone Number</label>
                  <input type="tel" formControlName="parent_phone"
                         placeholder="+233 XX XXX XXXX" />
                </div>

                <div class="form-group">
                  <label>Email</label>
                  <input type="email" formControlName="parent_email"
                         placeholder="parent@example.com"
                         [class.error]="studentForm.get('parent_email')?.invalid &&
                                        studentForm.get('parent_email')?.touched" />
                  <span class="error-message">{{ getError('parent_email') }}</span>
                </div>

                <div class="form-group">
                  <label>Address</label>
                  <input type="text" formControlName="address"
                         placeholder="Home address" />
                </div>
              </div>
            </div>

            <!-- Actions -->
            <div class="form-actions">
              <button type="button" class="btn-secondary"
                      (click)="cancel()" [disabled]="loading">
                Cancel
              </button>
              <button type="submit" class="btn-primary" [disabled]="loading">
                <span *ngIf="!loading">
                  <i class="ri-user-add-line"></i> Add Student
                </span>
                <span *ngIf="loading">
                  <i class="ri-loader-4-line spin"></i> Adding...
                </span>
              </button>
            </div>

          </form>
        </div>
      </div>
    </div>
  </div>
</div>
